<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Tailwind WP CF7 Safelist File</title>
</head>
<body>
    <!--
      Bu dosya, dinamik formlarda (örneğin Contact Form 7, WPForms) 
      kullanılan Tailwind sınıflarının PostCSS / Tailwind CSS derleyicisi 
      tarafından taranıp her zaman css çıktısına dahil edilmesini (safelist) sağlar.
    -->

    <!-- 1. Callback Bar Form (Bizi Arayalım Formu - Gerçek WordPress CF7 Rendered Çıktısı) -->
    <section class="bg-brand-light border-y border-gray-100 py-10">
        <div class="container mx-auto px-4">
            <div class="flex flex-col lg:flex-row items-center justify-between gap-6">
                <h3 class="text-xl md:text-2xl font-['Cormorant_Garamond'] text-brand italic">Numaranızı Bırakın Arayalım</h3>
                <div class="flex flex-wrap items-start gap-4 justify-center">
                    <span class="wpcf7-form-control-wrap" data-name="your-name">
                        <input class="wpcf7-form-control wpcf7-text wpcf7-validates-as-required bg-white border-b border-gray-200 px-4 py-2.5 text-base w-full sm:w-48 focus:outline-none focus:border-brand" placeholder="Ad Soyad*" type="text" name="your-name">
                    </span>
                    <span class="wpcf7-form-control-wrap" data-name="your-email">
                        <input class="wpcf7-form-control wpcf7-email wpcf7-validates-as-required wpcf7-text wpcf7-validates-as-email bg-white border-b border-gray-200 px-4 py-2.5 text-base w-full sm:w-44 focus:outline-none focus:border-brand" placeholder="E-posta*" type="email" name="your-email">
                    </span>
                    <span class="wpcf7-form-control-wrap" data-name="your-country">
                        <input class="wpcf7-form-control wpcf7-text wpcf7-validates-as-required bg-white border-b border-gray-200 px-4 py-2.5 text-base w-full sm:w-36 focus:outline-none focus:border-brand" placeholder="Ülke*" type="text" name="your-country">
                    </span>
                    <span class="wpcf7-form-control-wrap" data-name="your-phone">
                        <input class="wpcf7-form-control wpcf7-tel wpcf7-validates-as-required wpcf7-text wpcf7-validates-as-tel bg-white border-b border-gray-200 px-4 py-2.5 text-base w-full sm:w-36 focus:outline-none focus:border-brand" placeholder="Telefon*" type="tel" name="your-phone">
                    </span>
                    <span class="wpcf7-form-control-wrap" data-name="your-subject">
                        <select class="wpcf7-form-control wpcf7-select wpcf7-validates-as-required bg-white border-b border-gray-200 px-4 py-2.5 text-base text-gray-400 focus:outline-none w-full sm:w-36" name="your-subject">
                            <option value="Konu*">Konu*</option>
                            <option value="Burun Estetiği">Burun Estetiği</option>
                            <option value="Vücut Estetiği">Vücut Estetiği</option>
                        </select>
                    </span>
                    <input class="wpcf7-form-control wpcf7-submit bg-brand text-white px-8 py-3 text-base font-bold tracking-widest hover:bg-opacity-90 transition-all uppercase rounded-sm cursor-pointer" type="submit" value="GÖNDER">
                </div>
            </div>
        </div>
    </section>

    <!-- 2. Footer Contact Form (Gerçek WordPress CF7 Rendered Çıktısı) -->
    <div class="bg-brand-light p-8 rounded-sm">
        <div class="space-y-4">
            <span class="wpcf7-form-control-wrap" data-name="your-name">
                <input class="wpcf7-form-control wpcf7-text wpcf7-validates-as-required bg-white border-b border-gray-200 px-4 py-2.5 text-base w-full focus:outline-none focus:border-brand" placeholder="Ad Soyad*" type="text" name="your-name">
            </span>
            <span class="wpcf7-form-control-wrap" data-name="your-country">
                <input class="wpcf7-form-control wpcf7-text wpcf7-validates-as-required bg-white border-b border-gray-200 px-4 py-2.5 text-base w-full focus:outline-none focus:border-brand" placeholder="Ülke*" type="text" name="your-country">
            </span>
            <span class="wpcf7-form-control-wrap" data-name="your-phone">
                <input class="wpcf7-form-control wpcf7-tel wpcf7-validates-as-required wpcf7-text wpcf7-validates-as-tel bg-white border-b border-gray-200 px-4 py-2.5 text-base w-full focus:outline-none focus:border-brand" placeholder="Telefon No*" type="tel" name="your-phone">
            </span>
            <span class="wpcf7-form-control-wrap" data-name="your-message">
                <textarea class="wpcf7-form-control wpcf7-textarea bg-white border-b border-gray-200 px-4 py-2.5 text-base w-full focus:outline-none focus:border-brand resize-none" rows="3" placeholder="Mesaj*" name="your-message"></textarea>
            </span>
            <input class="wpcf7-form-control wpcf7-submit bg-brand text-white px-8 py-3 text-base font-bold tracking-widest w-full hover:bg-opacity-90 transition-all uppercase rounded-sm cursor-pointer" type="submit" value="GÖNDER">
        </div>
    </div>

    <!-- 3. Contact Page Form (İletişim Sayfası Formu - Gerçek WordPress CF7 Rendered Çıktısı) -->
    <div class="bg-white p-8">
        <div class="space-y-8">
            <div class="relative">
                <span class="wpcf7-form-control-wrap" data-name="your-name">
                    <input class="wpcf7-form-control wpcf7-text wpcf7-validates-as-required w-full bg-white border-b border-gray-200 py-3 text-base focus:outline-none focus:border-[#8b6e4e] transition-colors" placeholder="Ad Soyad*" type="text" name="your-name">
                </span>
            </div>
            <div class="relative">
                <span class="wpcf7-form-control-wrap" data-name="your-country">
                    <input class="wpcf7-form-control wpcf7-text wpcf7-validates-as-required w-full bg-white border-b border-gray-200 py-3 text-base focus:outline-none focus:border-[#8b6e4e] transition-colors" placeholder="Ülke*" type="text" name="your-country">
                </span>
            </div>
            <div class="relative">
                <span class="wpcf7-form-control-wrap" data-name="your-phone">
                    <input class="wpcf7-form-control wpcf7-tel wpcf7-validates-as-required wpcf7-text wpcf7-validates-as-tel w-full bg-white border-b border-gray-200 py-3 text-base focus:outline-none focus:border-[#8b6e4e] transition-colors" placeholder="Telefon No*" type="tel" name="your-phone">
                </span>
            </div>
            <div class="relative">
                <span class="wpcf7-form-control-wrap" data-name="your-message">
                    <textarea class="wpcf7-form-control wpcf7-textarea w-full bg-white border-b border-gray-200 py-3 text-base focus:outline-none focus:border-[#8b6e4e] transition-colors resize-none" rows="4" placeholder="Mesaj*" name="your-message"></textarea>
                </span>
            </div>
            <input class="wpcf7-form-control wpcf7-submit bg-[#6d553e] text-white px-12 py-4 font-bold tracking-widest uppercase hover:bg-opacity-90 transition-all rounded-sm shadow-md cursor-pointer" type="submit" value="GÖNDER">
        </div>
    </div>
</body>
</html>
