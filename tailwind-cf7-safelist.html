<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Tailwind WP CF7 Safelist File</title>
</head>
<body>
    <!--
      Bu dosya, dinamik formlarda (örneğin Contact Form 7, WPForms) 
      kullanılan Tailwind sınıflarının PostCSS / Tailwind CSS derleyicisi 
      tarafından taranıp her zaman css çıktısına dahil edilmesini (safelist) sağlar.
    -->

    <!-- 1. Callback Bar Form (Bizi Arayalım Formu - Gerçek WordPress CF7 Rendered Çıktısı) -->
    <section class="bg-brand-light border-y border-gray-100 py-10">
        <div class="container mx-auto px-4">
            <div class="flex flex-col lg:flex-row items-center justify-between gap-6">
                <h3 class="text-xl md:text-2xl font-['Cormorant_Garamond'] text-brand italic">Numaranızı Bırakın Arayalım</h3>
                <div class="flex flex-wrap items-start gap-4 justify-center">
                    <span class="wpcf7-form-control-wrap" data-name="your-name">
                        <input class="wpcf7-form-control wpcf7-text wpcf7-validates-as-required bg-white border-b border-gray-200 px-4 py-2.5 text-base w-full sm:w-48 focus:outline-none focus:border-brand" placeholder="Ad Soyad*" type="text" name="your-name">
                    </span>
                    <span class="wpcf7-form-control-wrap" data-name="your-email">
                        <input class="wpcf7-form-control wpcf7-email wpcf7-validates-as-required wpcf7-text wpcf7-validates-as-email bg-white border-b border-gray-200 px-4 py-2.5 text-base w-full sm:w-44 focus:outline-none focus:border-brand" placeholder="E-posta*" type="email" name="your-email">
                    </span>
                    <span class="wpcf7-form-control-wrap" data-name="your-country">
                        <input class="wpcf7-form-control wpcf7-text wpcf7-validates-as-required bg-white border-b border-gray-200 px-4 py-2.5 text-base w-full sm:w-36 focus:outline-none focus:border-brand" placeholder="Ülke*" type="text" name="your-country">
                    </span>
                    <span class="wpcf7-form-control-wrap" data-name="your-phone">
                        <input class="wpcf7-form-control wpcf7-tel wpcf7-validates-as-required wpcf7-text wpcf7-validates-as-tel bg-white border-b border-gray-200 px-4 py-2.5 text-base w-full sm:w-36 focus:outline-none focus:border-brand" placeholder="Telefon*" type="tel" name="your-phone">
                    </span>
                    <span class="wpcf7-form-control-wrap" data-name="your-subject">
                        <select class="wpcf7-form-control wpcf7-select wpcf7-validates-as-required bg-white border-b border-gray-200 px-4 py-2.5 text-base text-gray-400 focus:outline-none w-full sm:w-36" name="your-subject">
                            <option value="Konu*">Konu*</option>
                            <option value="Burun Estetiği">Burun Estetiği</option>
                            <option value="Vücut Estetiği">Vücut Estetiği</option>
                        </select>
                    </span>
                    <input class="wpcf7-form-control wpcf7-submit bg-brand text-white px-8 py-3 text-base font-bold tracking-widest hover:bg-opacity-90 transition-all uppercase rounded-sm cursor-pointer" type="submit" value="GÖNDER">
                </div>
            </div>
        </div>
    </section>

    <!-- 2. Footer Contact Form (Örnek Diğer Dinamik Sınıflar) -->
    <div class="bg-brand-light p-8 rounded-sm">
        <form class="space-y-4">
            <input type="text" class="bg-white border-b border-gray-200 px-4 py-2.5 text-base w-full focus:outline-none focus:border-brand">
            <input type="email" class="bg-white border-b border-gray-200 px-4 py-2.5 text-base w-full focus:outline-none focus:border-brand">
            <input type="tel" class="bg-white border-b border-gray-200 px-4 py-2.5 text-base w-full focus:outline-none focus:border-brand">
            <textarea rows="3" class="bg-white border-b border-gray-200 px-4 py-2.5 text-base w-full focus:outline-none focus:border-brand resize-none"></textarea>
            <button class="bg-brand text-white px-8 py-3 text-base font-bold tracking-widest w-full hover:bg-opacity-90 transition-all uppercase rounded-sm cursor-pointer">GÖNDER</button>
        </form>
    </div>
</body>
</html>
